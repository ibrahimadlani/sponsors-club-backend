<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Contrat • Validation & signature • SponsorsClub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            color-scheme: light;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: #0b1120;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
        }
        main {
            width: min(1180px, 100%);
            background: #f8fafc;
            border-radius: 28px;
            box-shadow: 0 40px 100px rgba(15, 23, 42, 0.45);
            display: grid;
            gap: 32px;
            padding: 40px;
        }
        header {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
        }
        header h1 {
            margin: 0;
            font-size: clamp(1.6rem, 2.4vw, 2.2rem);
            color: #0f172a;
        }
        header p {
            margin: 6px 0 0;
            color: #475569;
        }
        .header-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: flex-end;
        }
        section {
            background: white;
            border-radius: 24px;
            padding: 28px;
            display: grid;
            gap: 20px;
            box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.05);
        }
        h2 {
            margin: 0;
            font-size: 1.25rem;
            color: #0f172a;
        }
        .status-flow {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        }
        .step {
            position: relative;
            padding: 18px;
            border-radius: 18px;
            background: #e0f2fe;
            border: 1px solid rgba(14, 116, 144, 0.25);
            display: grid;
            gap: 6px;
        }
        .step.completed {
            background: #dcfce7;
            border-color: rgba(22, 163, 74, 0.35);
        }
        .step span {
            font-size: 0.8rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #0369a1;
            font-weight: 700;
        }
        .step.completed span { color: #047857; }
        .step strong {
            color: #0f172a;
            font-size: 1.05rem;
        }
        .owner-actions {
            display: grid;
            gap: 16px;
        }
        .owner-actions button {
            appearance: none;
            border: none;
            border-radius: 16px;
            padding: 16px 20px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }
        .owner-actions button.primary {
            background: linear-gradient(120deg, #2563eb, #1d4ed8);
            color: white;
            box-shadow: 0 18px 36px rgba(37, 99, 235, 0.32);
        }
        .owner-actions button.secondary {
            background: rgba(148, 163, 184, 0.25);
            color: #1f2937;
        }
        .status-text {
            font-size: 0.9rem;
            color: #475569;
        }
        .status-text.error { color: #b91c1c; }
        .status-text.success { color: #15803d; }
        .timeline { display: grid; gap: 16px; }
        .timeline-entry {
            display: grid;
            gap: 6px;
            padding: 16px;
            border-radius: 18px;
            background: #fef3c7;
            border: 1px solid rgba(217, 119, 6, 0.32);
        }
        .timeline-entry:nth-child(even) {
            background: #ede9fe;
            border-color: rgba(99, 102, 241, 0.35);
        }
        .timeline-entry strong { color: #0f172a; }
        .file-card {
            border-radius: 18px;
            padding: 20px;
            background: #eef2ff;
            border: 1px solid rgba(79, 70, 229, 0.28);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .file-card .name {
            font-weight: 600;
            color: #3730a3;
        }
        .file-card button {
            appearance: none;
            border: none;
            border-radius: 999px;
            padding: 10px 20px;
            font-weight: 600;
            background: #4338ca;
            color: white;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }
        .file-card button:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 28px rgba(67, 56, 202, 0.32);
        }
        .revision {
            border-radius: 18px;
            padding: 18px;
            background: #f1f5f9;
            border: 1px solid rgba(148, 163, 184, 0.35);
            display: grid;
            gap: 10px;
        }
        .revision header {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: space-between;
        }
        .revision footer {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .button {
            appearance: none;
            border: none;
            border-radius: 999px;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            background: #2563eb;
            color: white;
        }
        .button.secondary { background: rgba(15, 23, 42, 0.08); color: #1e293b; }
        .button.ghost {
            background: transparent;
            color: #1d4ed8;
            border: 1px solid rgba(37, 99, 235, 0.35);
        }
        .button.ghost:hover {
            background: rgba(37, 99, 235, 0.12);
            color: #1e3a8a;
        }
        footer {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: flex-end;
        }
        footer a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            font-weight: 600;
            text-decoration: none;
        }
        @media (max-width: 760px) {
            body { padding: 20px; }
            main { padding: 28px; }
            section { padding: 22px; }
        }
    </style>
</head>
<body>
<main>
    <header>
        <div>
            <h1 id="contractTitle">Contrat en validation…</h1>
            <p id="contractMeta">Connexion à l'API…</p>
        </div>
        <div class="header-actions">
            <button type="button" class="button ghost" id="loginButton">Changer de compte</button>
            <span class="status-text" id="pageStatus">Chargement en cours…</span>
        </div>
    </header>

    <section>
        <h2>Progression du workflow</h2>
        <div class="status-flow" id="statusFlow"></div>
        <div class="status-text" id="statusFlowStatus"></div>
    </section>

    <section>
        <h2>Actions disponibles</h2>
        <form class="owner-actions" id="statusForm">
            <label style="display:grid; gap:8px;">
                Avancer le statut
                <select id="statusSelect"></select>
            </label>
            <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
                <button type="submit" class="button">Mettre à jour le statut</button>
                <span class="status-text" id="statusUpdate"></span>
            </div>
        </form>
        <button type="button" class="button secondary" id="openEditor">← Revenir à l'éditeur</button>
    </section>

    <section>
        <h2>Révisions proposées</h2>
        <div id="revisionsContainer" class="timeline"></div>
        <div class="status-text" id="revisionsStatus"></div>
    </section>

    <section>
        <h2>Fichier signé</h2>
        <div class="file-card" id="fileCard" style="display:none;">
            <div>
                <div class="name" id="fileName">Document</div>
                <div class="status-text" id="fileMeta"></div>
            </div>
            <button type="button" id="downloadFile">Télécharger</button>
        </div>
        <div class="status-text" id="fileStatus">Aucun fichier de signature disponible pour le moment.</div>
    </section>

    <footer>
        <a href="/poc/contracts/">📊 Retour au tableau de bord</a>
    </footer>
</main>
<script>
(function() {
    const ACCESS_KEY = 'scbAccessToken';
    const REFRESH_KEY = 'scbRefreshToken';
    const params = new URLSearchParams(window.location.search);
    const contractId = params.get('contractId');

    const contractTitle = document.getElementById('contractTitle');
    const contractMeta = document.getElementById('contractMeta');
    const pageStatus = document.getElementById('pageStatus');
    const statusFlow = document.getElementById('statusFlow');
    const statusFlowStatus = document.getElementById('statusFlowStatus');
    const statusSelect = document.getElementById('statusSelect');
    const statusForm = document.getElementById('statusForm');
    const statusUpdate = document.getElementById('statusUpdate');
    const revisionsContainer = document.getElementById('revisionsContainer');
    const revisionsStatus = document.getElementById('revisionsStatus');
    const fileCard = document.getElementById('fileCard');
    const fileStatus = document.getElementById('fileStatus');
    const fileName = document.getElementById('fileName');
    const fileMeta = document.getElementById('fileMeta');
    const downloadFile = document.getElementById('downloadFile');
    const openEditor = document.getElementById('openEditor');
    const loginButton = document.getElementById('loginButton');

    const state = {
        contract: null,
        revisions: [],
        statuses: [
            { value: 'draft', label: 'Brouillon' },
            { value: 'negotiation', label: 'Négociation' },
            { value: 'agreement', label: 'Accord' },
            { value: 'active', label: 'Actif' },
            { value: 'terminated', label: 'Terminé' },
        ],
    };

    function redirectToLogin() {
        window.localStorage.removeItem(ACCESS_KEY);
        window.localStorage.removeItem(REFRESH_KEY);
        window.location.href = '/poc/login/';
    }

    if (loginButton) {
        loginButton.addEventListener('click', redirectToLogin);
    }

    function readCookie(name) {
        const cookies = document.cookie ? document.cookie.split(';') : [];
        for (const chunk of cookies) {
            const [key, value] = chunk.trim().split('=');
            if (key === name) {
                return decodeURIComponent(value);
            }
        }
        return null;
    }

    function isSafeMethod(method) {
        return ['GET', 'HEAD', 'OPTIONS', 'TRACE'].includes(method);
    }

    async function apiRequest({ url, method = 'GET', data = null }) {
        const headers = { 'Accept': 'application/json' };
        const options = { method, headers, credentials: 'same-origin' };
        if (data !== null) {
            options.body = JSON.stringify(data);
            headers['Content-Type'] = 'application/json';
        }
        if (!isSafeMethod(method)) {
            const csrfToken = readCookie('csrftoken');
            if (csrfToken) {
                headers['X-CSRFToken'] = csrfToken;
            }
        }
        const token = window.localStorage.getItem(ACCESS_KEY);
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }
        const response = await fetch(url, options);
        const text = await response.text();
        let payload = null;
        if (text) {
            try {
                payload = JSON.parse(text);
            } catch (error) {
                payload = text;
            }
        }
        return { ok: response.ok, status: response.status, data: payload };
    }

    function setStatus(element, message, variant) {
        if (!element) {
            return;
        }
        element.textContent = message || '';
        element.classList.remove('error', 'success');
        if (variant) {
            element.classList.add(variant);
        }
    }

    function getStatusIndex(value) {
        return state.statuses.findIndex((item) => item.value === value);
    }

    function renderContract() {
        if (!state.contract) {
            return;
        }
        contractTitle.textContent = state.contract.title;
        const parts = [];
        if (state.contract.organisation) {
            parts.push(`Organisation • ${state.contract.organisation.name}`);
        }
        if (state.contract.agent) {
            parts.push(`Agent • ${state.contract.agent.display_name}`);
        }
        if (state.contract.updated_at) {
            const date = new Date(state.contract.updated_at);
            parts.push(`Mis à jour le ${date.toLocaleDateString('fr-FR', { year: 'numeric', month: 'short', day: 'numeric' })}`);
        }
        contractMeta.textContent = parts.join(' · ');
        setStatus(pageStatus, `Statut actuel : ${state.contract.status_label}`);
        renderStatusFlow();
        renderStatusSelect();
        renderFile();
    }

    function renderStatusFlow() {
        statusFlow.innerHTML = '';
        if (!state.contract) {
            return;
        }
        const currentIndex = getStatusIndex(state.contract.status);
        for (const [index, item] of state.statuses.entries()) {
            const step = document.createElement('div');
            step.className = 'step';
            if (index <= currentIndex) {
                step.classList.add('completed');
            }
            const span = document.createElement('span');
            span.textContent = `Étape ${index + 1}`;
            const strong = document.createElement('strong');
            strong.textContent = item.label;
            step.appendChild(span);
            step.appendChild(strong);
            statusFlow.appendChild(step);
        }
        setStatus(statusFlowStatus, 'Chaque étape doit être validée par un collaborateur owner.');
    }

    function renderStatusSelect() {
        if (!statusSelect || !state.contract) {
            return;
        }
        statusSelect.innerHTML = '';
        const currentIndex = getStatusIndex(state.contract.status);
        for (const [index, item] of state.statuses.entries()) {
            const option = document.createElement('option');
            option.value = item.value;
            option.textContent = item.label;
            if (index === currentIndex) {
                option.selected = true;
            }
            if (index < currentIndex || index > currentIndex + 1) {
                option.disabled = true;
            }
            statusSelect.appendChild(option);
        }
    }

    function renderRevisions() {
        revisionsContainer.innerHTML = '';
        if (!state.revisions.length) {
            setStatus(revisionsStatus, 'Aucune révision proposée pour ce contrat.');
            return;
        }
        setStatus(revisionsStatus, '');
        for (const revision of state.revisions) {
            const entry = document.createElement('div');
            entry.className = 'revision';

            const header = document.createElement('header');
            const strong = document.createElement('strong');
            strong.textContent = revision.proposed_by ? revision.proposed_by.email : 'Utilisateur inconnu';
            const badge = document.createElement('span');
            badge.className = 'status-text';
            if (revision.accepted === true) {
                badge.textContent = 'Acceptée';
                badge.classList.add('success');
            } else if (revision.accepted === false) {
                badge.textContent = 'Refusée';
                badge.classList.add('error');
            } else {
                badge.textContent = 'En attente';
            }
            header.appendChild(strong);
            header.appendChild(badge);
            entry.appendChild(header);

            if (revision.comment) {
                const comment = document.createElement('p');
                comment.textContent = revision.comment;
                entry.appendChild(comment);
            }

            if (revision.clauses_changed && revision.clauses_changed.length) {
                const list = document.createElement('ul');
                for (const clause of revision.clauses_changed) {
                    const item = document.createElement('li');
                    item.textContent = clause.title;
                    list.appendChild(item);
                }
                entry.appendChild(list);
            }

            const footer = document.createElement('footer');
            const created = new Date(revision.created_at);
            const meta = document.createElement('span');
            meta.className = 'status-text';
            meta.textContent = `Proposé le ${created.toLocaleDateString('fr-FR', { year: 'numeric', month: 'short', day: 'numeric' })}`;
            footer.appendChild(meta);

            if (revision.accepted === null) {
                const acceptButton = document.createElement('button');
                acceptButton.type = 'button';
                acceptButton.className = 'button';
                acceptButton.textContent = 'Accepter la révision';
                acceptButton.addEventListener('click', async () => {
                    const response = await apiRequest({
                        url: `/api/contracts/${state.contract.id}/revisions/${revision.id}/accept/`,
                        method: 'POST',
                    });
                    if (response.ok) {
                        await loadRevisions();
                    } else {
                        alert(`Impossible d'accepter la révision (statut ${response.status}).`);
                    }
                });
                footer.appendChild(acceptButton);
            }

            entry.appendChild(footer);
            revisionsContainer.appendChild(entry);
        }
    }

    function renderFile() {
        if (!fileCard || !state.contract) {
            return;
        }
        if (state.contract.signed_file) {
            fileCard.style.display = 'flex';
            fileStatus.style.display = 'none';
            fileName.textContent = state.contract.signed_file.filename;
            const created = new Date(state.contract.signed_file.created_at);
            fileMeta.textContent = `Ajouté le ${created.toLocaleDateString('fr-FR', { year: 'numeric', month: 'short', day: 'numeric' })}`;
            if (downloadFile) {
                downloadFile.onclick = () => {
                    window.open(`/api/contracts/${state.contract.id}/export/`, '_blank');
                };
            }
        } else {
            fileCard.style.display = 'none';
            fileStatus.style.display = 'block';
            fileStatus.textContent = 'Aucun export PDF n\'a encore été importé.';
        }
    }

    async function loadContract() {
        if (!contractId) {
            setStatus(pageStatus, "Aucun contrat sélectionné. Revenez depuis le tableau de bord.", 'error');
            return;
        }
        const response = await apiRequest({ url: `/api/contracts/${contractId}/` });
        if (response.ok) {
            state.contract = response.data;
            renderContract();
        } else {
            setStatus(pageStatus, `Erreur lors du chargement (${response.status}).`, 'error');
        }
    }

    async function loadRevisions() {
        if (!contractId) {
            return;
        }
        const response = await apiRequest({ url: `/api/contracts/${contractId}/revisions/` });
        if (response.ok) {
            state.revisions = response.data;
            renderRevisions();
        } else {
            setStatus(revisionsStatus, `Impossible de récupérer les révisions (${response.status}).`, 'error');
        }
    }

    async function loadStatuses() {
        const response = await apiRequest({ url: '/api/contracts/options/' });
        if (response.ok && response.data.statuses) {
            state.statuses = response.data.statuses;
            renderStatusSelect();
            renderStatusFlow();
        }
    }

    if (!contractId) {
        setStatus(pageStatus, "Aucun contrat sélectionné. Revenez depuis le tableau de bord.", 'error');
        return;
    }

    if (openEditor) {
        openEditor.addEventListener('click', () => {
            window.location.href = `/poc/contracts/editor/?contractId=${contractId}`;
        });
    }

    if (statusForm) {
        statusForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            if (!statusSelect.value || !state.contract) {
                return;
            }
            setStatus(statusUpdate, 'Mise à jour du statut…');
            const response = await apiRequest({
                url: `/api/contracts/${state.contract.id}/status/`,
                method: 'PATCH',
                data: { status: statusSelect.value },
            });
            if (response.ok) {
                setStatus(statusUpdate, 'Statut mis à jour.', 'success');
                await loadContract();
            } else {
                setStatus(statusUpdate, `Refusé (${response.status}).`, 'error');
            }
        });
    }

    loadStatuses();
    loadContract();
    loadRevisions();
})();
</script>
</body>
</html>
