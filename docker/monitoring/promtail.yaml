server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  # Tracks the last-read byte position per log file so restarts don't re-ship logs
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    # Retry failed pushes with exponential back-off before dropping
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  - job_name: docker-containers
    # docker_sd_configs discovers running containers via the Docker socket and
    # streams their logs using the Docker API — no filesystem mount required,
    # which means it works correctly on Mac/Docker Desktop too.
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Strip the leading "/" from container names (e.g. "/sponsors_web_1" → "sponsors_web_1")
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # Tag each line as "stdout" or "stderr"
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      # Add the docker-compose service name for easy filtering in Grafana
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      # Add the docker-compose project name so multi-project setups stay separate
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: compose_project
    pipeline_stages:
      # Automatically parses Docker's JSON log format (log, stream, time fields)
      - docker: {}
