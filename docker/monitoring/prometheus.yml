global:
  scrape_interval: 15s       # Pull metrics every 15 seconds
  evaluation_interval: 15s   # Evaluate alerting rules every 15 seconds
  external_labels:
    environment: local

scrape_configs:
  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Django application metrics exposed by django-prometheus at /metrics
  - job_name: django
    static_configs:
      - targets: ['web:8000']
    metrics_path: /metrics

  # PostgreSQL internals via postgres-exporter
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis internals via redis-exporter
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
