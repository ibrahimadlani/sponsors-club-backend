services:

  # ---------------------------------------------------------------------------
  # Application services (started by default with `docker compose up`)
  # ---------------------------------------------------------------------------

  web:
    build: .
    entrypoint: ["/bin/sh", "-c", "/app/scripts/migrate.sh && /app/scripts/entrypoint.sh"]
    environment:
      # 12-Factor database URL — parsed by dj-database-url in settings.py
      DATABASE_URL: postgres://sponsors:sponsors@db:5432/sponsors_club
      # Dev-only insecure key — never use this value outside of local Docker
      DJANGO_SECRET_KEY: "django-insecure-local-docker-dev-key-replace-in-production"
      DJANGO_DEBUG: "true"
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DJANGO_SUPERUSER_PASSWORD: Passw0rd!
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - static_volume:/app/staticfiles

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sponsors_club
      POSTGRES_USER: sponsors
      POSTGRES_PASSWORD: sponsors
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sponsors -d sponsors_club"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    ports:
      - "6379:6379"

  # ---------------------------------------------------------------------------
  # Monitoring stack — only started with:  docker compose --profile monitoring up
  # ---------------------------------------------------------------------------
  # Usage:
  #   docker compose --profile monitoring up          → full stack
  #   docker compose --profile monitoring up grafana  → single service
  #   docker compose --profile monitoring down -v     → teardown + remove volumes
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v3.4.1
    profiles: ["monitoring"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"       # Allow hot-reload via POST /-/reload
      - "--web.enable-admin-api"
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - web
      - postgres-exporter
      - redis-exporter

  grafana:
    image: grafana/grafana:12.0.1
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      # Auto-provision Prometheus + Loki as datasources on first boot
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.5.1
    profiles: ["monitoring"]
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./docker/monitoring/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.5.1
    profiles: ["monitoring"]
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./docker/monitoring/promtail.yaml:/etc/promtail/config.yml:ro
      # Docker socket — lets Promtail discover containers and stream their logs
      # via the Docker API (works on Mac/Docker Desktop, not just Linux)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    profiles: ["monitoring"]
    environment:
      # Connection string for the same DB used by the web service
      DATA_SOURCE_NAME: "postgresql://sponsors:sponsors@db:5432/sponsors_club?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      db:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.69.0
    profiles: ["monitoring"]
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      - redis

volumes:
  postgres_data:
  static_volume:
  # Monitoring-specific volumes (only created when the monitoring profile is active)
  prometheus_data:
  grafana_data:
  loki_data:
