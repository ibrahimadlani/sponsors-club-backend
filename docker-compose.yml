services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sponsors_club:sponsors_club@db:5432/sponsors_club
      - PORT=8000
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://backend:8000
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=sponsors_club
      - POSTGRES_USER=sponsors_club
      - POSTGRES_PASSWORD=sponsors_club
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
  frontend_node_modules:
